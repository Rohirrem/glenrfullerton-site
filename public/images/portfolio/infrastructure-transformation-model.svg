<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240" role="img" aria-labelledby="title desc">
  <title id="title">Infrastructure transformation program model</title>
  <desc id="desc">A flow diagram showing platform modernization, cross-team coordination, risk and continuity management, and executive visibility.</desc>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#6f2da8"/>
    </marker>
  </defs>

  <rect x="20" y="70" width="185" height="95" rx="14" ry="14" fill="#f7f9fb" stroke="#005f5f" stroke-width="2"/>
  <text x="112" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#17313b">Platform</text>
  <text x="112" y="132" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#17313b">Modernization</text>
  <text x="112" y="154" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5b63">Systems and infrastructure</text>

  <rect x="245" y="70" width="185" height="95" rx="14" ry="14" fill="#f7f9fb" stroke="#005f5f" stroke-width="2"/>
  <text x="337" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#17313b">Cross-Team</text>
  <text x="337" y="132" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#17313b">Coordination</text>
  <text x="337" y="154" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5b63">Dependencies and sequencing</text>

  <rect x="470" y="70" width="185" height="95" rx="14" ry="14" fill="#f7f9fb" stroke="#005f5f" stroke-width="2"/>
  <text x="562" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#17313b">Risk and</text>
  <text x="562" y="132" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#17313b">Continuity</text>
  <text x="562" y="154" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5b63">Operational stability</text>

  <rect x="695" y="70" width="185" height="95" rx="14" ry="14" fill="#f7f9fb" stroke="#005f5f" stroke-width="2"/>
  <text x="787" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#17313b">Executive</text>
  <text x="787" y="132" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#17313b">Visibility</text>
  <text x="787" y="154" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5b63">Milestones and risks</text>

  <line x1="205" y1="118" x2="245" y2="118" stroke="#6f2da8" stroke-width="4" marker-end="url(#arrowhead)"/>
  <line x1="430" y1="118" x2="470" y2="118" stroke="#6f2da8" stroke-width="4" marker-end="url(#arrowhead)"/>
  <line x1="655" y1="118" x2="695" y2="118" stroke="#6f2da8" stroke-width="4" marker-end="url(#arrowhead)"/>
</svg>