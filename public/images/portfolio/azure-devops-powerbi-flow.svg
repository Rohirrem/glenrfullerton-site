<svg xmlns="http://www.w3.org/2000/svg" width="900" height="220" viewBox="0 0 900 220" role="img" aria-labelledby="title desc">
  <title id="title">Azure DevOps to Power BI executive visibility flow</title>
  <desc id="desc">A simple flow diagram showing Azure DevOps feeding a delivery data model, then Power BI dashboards, then executive portfolio visibility.</desc>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#6f2da8"/>
    </marker>
  </defs>

  <rect x="20" y="60" width="180" height="90" rx="14" ry="14" fill="#f7f9fb" stroke="#005f5f" stroke-width="2"/>
  <text x="110" y="105" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#17313b">Azure DevOps</text>
  <text x="110" y="128" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5b63">Work tracking &amp; sprint data</text>

  <rect x="250" y="60" width="180" height="90" rx="14" ry="14" fill="#f7f9fb" stroke="#005f5f" stroke-width="2"/>
  <text x="340" y="105" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#17313b">Delivery Data</text>
  <text x="340" y="128" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5b63">Standardized reporting model</text>

  <rect x="480" y="60" width="180" height="90" rx="14" ry="14" fill="#f7f9fb" stroke="#005f5f" stroke-width="2"/>
  <text x="570" y="105" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#17313b">Power BI</text>
  <text x="570" y="128" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5b63">Dashboards &amp; trend analysis</text>

  <rect x="710" y="60" width="170" height="90" rx="14" ry="14" fill="#f7f9fb" stroke="#005f5f" stroke-width="2"/>
  <text x="795" y="105" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#17313b">Executive</text>
  <text x="795" y="132" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#17313b">Visibility</text>

  <line x1="200" y1="105" x2="250" y2="105" stroke="#6f2da8" stroke-width="4" marker-end="url(#arrowhead)"/>
  <line x1="430" y1="105" x2="480" y2="105" stroke="#6f2da8" stroke-width="4" marker-end="url(#arrowhead)"/>
  <line x1="660" y1="105" x2="710" y2="105" stroke="#6f2da8" stroke-width="4" marker-end="url(#arrowhead)"/>
</svg>