baseURL = "https://glenrfullerton.org/"
languageCode = "en-us"
title = "Glen Fullerton"
theme = "PaperMod"

[pagination]
  pagerSize = 10

[params]
  defaultTheme = "light"
  ShowReadingTime = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true

[params.profileMode]
enabled = false
title = "Glen Fullerton"
subtitle = "Enterprise Program & PMO Leader | Governance, Portfolio Visibility, and Delivery Transformation"
imageURL = "/images/headshot/glen.jpg"
imageWidth = 240
imageHeight = 240
[params.homeInfoParams]
    Title = "Enterprise Program & PMO Leadership"
    Content = "Helping organizations turn strategy into delivery through governance, portfolio discipline, and delivery transformation."
 

[[params.profileMode.buttons]]
name = "Portfolio"
url = "/portfolio"

[[params.profileMode.buttons]]
