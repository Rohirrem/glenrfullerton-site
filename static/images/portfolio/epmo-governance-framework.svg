<svg xmlns="http://www.w3.org/2000/svg" width="900" height="240" viewBox="0 0 900 240" role="img" aria-labelledby="title desc">
  <title id="title">Enterprise PMO governance framework</title>
  <desc id="desc">A flow diagram showing intake and business case, portfolio review board, stage gate governance, and executive reporting.</desc>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#6f2da8"/>
    </marker>
  </defs>

  <rect x="20" y="70" width="180" height="95" rx="14" ry="14" fill="#f7f9fb" stroke="#005f5f" stroke-width="2"/>
  <text x="110" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#17313b">Intake</text>
  <text x="110" y="132" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5b63">Business case</text>
  <text x="110" y="152" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5b63">Prioritization input</text>

  <rect x="245" y="70" width="180" height="95" rx="14" ry="14" fill="#f7f9fb" stroke="#005f5f" stroke-width="2"/>
  <text x="335" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#17313b">Portfolio Board</text>
  <text x="335" y="132" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5b63">Review and approval</text>
  <text x="335" y="152" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5b63">Priority decisions</text>

  <rect x="470" y="70" width="180" height="95" rx="14" ry="14" fill="#f7f9fb" stroke="#005f5f" stroke-width="2"/>
  <text x="560" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#17313b">Stage Gates</text>
  <text x="560" y="132" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5b63">Governance reviews</text>
  <text x="560" y="152" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5b63">Risk and delivery control</text>

  <rect x="695" y="70" width="185" height="95" rx="14" ry="14" fill="#f7f9fb" stroke="#005f5f" stroke-width="2"/>
  <text x="787" y="108" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#17313b">Executive</text>
  <text x="787" y="132" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="#17313b">Reporting</text>
  <text x="787" y="154" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#4b5b63">Portfolio visibility</text>

  <line x1="200" y1="118" x2="245" y2="118" stroke="#6f2da8" stroke-width="4" marker-end="url(#arrowhead)"/>
  <line x1="425" y1="118" x2="470" y2="118" stroke="#6f2da8" stroke-width="4" marker-end="url(#arrowhead)"/>
  <line x1="650" y1="118" x2="695" y2="118" stroke="#6f2da8" stroke-width="4" marker-end="url(#arrowhead)"/>
</svg>